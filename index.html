<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Rate Limiter Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
            --error: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            backdrop-filter: blur(12px);
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .stat-card h3 {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 0 0 0.5rem 0;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
            font-variant-numeric: tabular-nums;
            transition: transform 0.15s ease;
        }

        .stat-value.allowed { color: var(--success); text-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .stat-value.blocked { color: var(--error); text-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
        .stat-value.total { color: var(--text-main); }

        .actions {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        button {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        button:active {
            transform: translateY(1px);
        }

        .log-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            max-height: 250px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.9rem;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .log-entry {
            margin-bottom: 0.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            animation: fadeIn 0.3s ease-out;
        }

        .log-entry:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .log-time {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .log-status {
            font-weight: bold;
        }

        .status-200 { color: var(--success); }
        .status-429 { color: var(--error); }
        .status-401 { color: #f59e0b; }

        .log-body {
            color: #cbd5e1;
            word-break: break-all;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>API Rate Limiter</h1>
            <p class="subtitle">5 requests per minute limit (API Key: secret_key_123)</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Requests</h3>
                <p class="stat-value total" id="stat-total">0</p>
            </div>
            <div class="stat-card">
                <h3>Allowed</h3>
                <p class="stat-value allowed" id="stat-allowed">0</p>
            </div>
            <div class="stat-card">
                <h3>Blocked</h3>
                <p class="stat-value blocked" id="stat-blocked">0</p>
            </div>
        </div>

        <div class="actions">
            <button id="send-btn">Send API Request</button>
        </div>

        <div class="log-container" id="log-container">
            <!-- Logs will appear here -->
        </div>
    </div>

    <script>
        const API_KEY = 'secret_key_123';
        const API_URL = '/data?api_key=' + API_KEY;
        const STATS_URL = '/stats';

        const domElements = {
            total: document.getElementById('stat-total'),
            allowed: document.getElementById('stat-allowed'),
            blocked: document.getElementById('stat-blocked'),
            sendBtn: document.getElementById('send-btn'),
            logContainer: document.getElementById('log-container')
        };

        async function updateStats() {
            try {
                const response = await fetch(STATS_URL);
                if (response.ok) {
                    const data = await response.json();
                    animateValue(domElements.total, data.total || 0);
                    animateValue(domElements.allowed, data.allowed || 0);
                    animateValue(domElements.blocked, data.blocked || 0);
                }
            } catch (error) {
                console.error("Error fetching stats:", error);
            }
        }

        function animateValue(element, newValue) {
            if (element.innerText !== newValue.toString()) {
                element.innerText = newValue;
                element.style.transform = 'scale(1.1)';
                setTimeout(() => { element.style.transform = 'scale(1)'; }, 150);
            }
        }

        function addLogEntry(status, bodyText) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const time = new Date().toLocaleTimeString();
            let statusClass = 'status-' + status;
            if (!['200', '429', '401'].includes(status.toString())) statusClass = '';

            entry.innerHTML = `
                <div class="log-time">${time} <span class="log-status ${statusClass}">[HTTP ${status}]</span></div>
                <div class="log-body">${bodyText}</div>
            `;
            
            domElements.logContainer.prepend(entry);
        }

        domElements.sendBtn.addEventListener('click', async () => {
            domElements.sendBtn.disabled = true;
            domElements.sendBtn.style.opacity = '0.7';

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                addLogEntry(response.status, JSON.stringify(data));
                await updateStats();
            } catch (error) {
                addLogEntry('ERROR', error.toString());
            } finally {
                setTimeout(() => {
                    domElements.sendBtn.disabled = false;
                    domElements.sendBtn.style.opacity = '1';
                }, 200);
            }
        });

        updateStats();
        setInterval(updateStats, 2000);
    </script>
</body>
</html>
